<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N2VN — 작품 상세</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <a href="/" class="header-logo">N2VN</a>
  <div id="auth-area" class="auth-area"></div>
</header>

<main class="page-main series-detail-page">

  <!-- 작품 헤더 -->
  <div class="series-hero">
    <div class="series-hero-thumb">
      <img id="series-thumb" src="" alt="" style="display:none;">
      <div id="series-thumb-placeholder" class="thumb-placeholder large">📖</div>
    </div>
    <div class="series-meta">
      <h1 id="series-title">—</h1>
      <p id="series-author" class="series-author-name"></p>
      <p id="series-description" class="series-description"></p>
      <p id="series-latest" class="series-latest-at"></p>
    </div>
  </div>

  <!-- 회차 목록 -->
  <section class="episode-list-section">
    <h3>회차 목록</h3>
    <ul id="episode-ul" class="episode-list">
      <li class="loading-placeholder">불러오는 중...</li>
    </ul>
  </section>

</main>

<!-- VN 플레이어 전체화면 모달 -->
<div id="vn-modal" class="modal-fullscreen hidden">
  <button id="vn-close-btn" onclick="closeVnPlayer()">✕</button>
  <iframe id="vn-iframe" src="player.html" allow="autoplay"></iframe>
</div>

<!-- 로그인 모달 -->
<div id="login-modal" class="modal hidden">
  <div class="modal-box">
    <button class="modal-close" onclick="Auth.hideLoginModal()">✕</button>
    <h2>로그인</h2>
    <input id="login-id" type="text" placeholder="아이디">
    <input id="login-password" type="password" placeholder="비밀번호"
           onkeydown="if(event.key==='Enter') Auth.submitLogin()">
    <p id="login-error" class="form-error"></p>
    <button class="btn-primary full-width" onclick="Auth.submitLogin()">로그인</button>
  </div>
</div>

<!-- 회원가입 모달 -->
<div id="register-modal" class="modal hidden">
  <div class="modal-box">
    <button class="modal-close" onclick="Auth.hideRegisterModal()">✕</button>
    <h2>회원가입</h2>
    <input id="reg-login-id" type="text" placeholder="아이디 (영문 소문자/숫자/_)">
    <input id="reg-email" type="email" placeholder="이메일">
    <input id="reg-password" type="password" placeholder="비밀번호 (8자 이상)">
    <input id="reg-nickname" type="text" placeholder="닉네임">
    <p id="register-error" class="form-error"></p>
    <button class="btn-primary full-width" onclick="Auth.submitRegister()">가입하기</button>
  </div>
</div>

<script src="common.js"></script>
<script src="auth.js"></script>
<script src="series.js"></script>
</body>
</html>
